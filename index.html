<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>007 入子彈 (Reload Strategy Game)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Setup Screen (Natural Flow) -->
    <div id="setup-screen" class="bg-black">
        <h1 class="text-4xl md:text-5xl font-black mb-6 text-yellow-500 italic tracking-tighter text-center">007 入子彈</h1>
        
        <div class="bg-gray-900 border border-gray-800 p-5 md:p-8 rounded-2xl w-full max-w-2xl shadow-2xl flex flex-col">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="bg-gray-800/30 p-3 rounded-lg">
                    <label class="flex justify-between mb-2 font-bold text-xs uppercase text-gray-400">
                        玩家人數: <span id="player-count-val" class="text-yellow-500">4</span>
                    </label>
                    <input type="range" id="player-count" min="2" max="8" value="4" class="w-full accent-yellow-500">
                </div>
                <div class="bg-gray-800/30 p-3 rounded-lg">
                    <label class="flex justify-between mb-2 font-bold text-xs uppercase text-gray-400">
                        倒數秒數: <span id="timer-val" class="text-yellow-500">9</span>
                    </label>
                    <input type="range" id="timer-setting" min="3" max="20" value="9" class="w-full accent-yellow-500">
                </div>
            </div>

            <div class="flex items-center justify-between mb-6 bg-gray-800 p-3 rounded-xl">
                <span class="font-bold text-sm">顯示子彈數量</span>
                <input type="checkbox" id="show-bullets" checked class="w-5 h-5 accent-yellow-500">
            </div>

            <div class="mb-3 text-[10px] text-gray-500 font-black px-2 flex justify-between uppercase tracking-widest">
                <span>角色 & 名稱</span>
                <span>控制類型</span>
            </div>
            
            <!-- No overflow-y-auto here, it will grow with contents -->
            <div id="player-config-list" class="mb-8">
                <!-- Injected via JS -->
            </div>

            <button id="start-game-btn" class="bg-yellow-500 hover:bg-yellow-400 text-black py-4 rounded-xl font-black text-xl w-full transition-all transform active:scale-95 shadow-lg">
                開始遊戲
            </button>
        </div>
    </div>

    <!-- Main Game UI (Fixed) -->
    <div id="game-ui" class="hidden game-container">
        <button id="exit-to-menu" onclick="resetToMenu()" class="hidden fixed top-4 right-4 z-[150] bg-red-900/80 border border-red-500 text-white px-3 py-1.5 rounded-lg font-bold text-xs hover:bg-red-600 transition-colors">
            返回主選單
        </button>

        <div id="game-arena" class="arena-wrapper">
            <div class="center-ui flex flex-col items-center justify-center text-center pointer-events-none select-none">
                <div id="beat-counter" class="beat-indicator">9</div>
                <div id="game-status" class="status-indicator">準備開始...</div>
            </div>
        </div>
    </div>

    <!-- Victory Screen Overlay -->
    <div id="victory-screen" class="hidden fixed inset-0 bg-black/95 z-[200] flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-4 animate-bounce text-8xl" id="winner-emoji">🏆</div>
        <h2 class="text-5xl font-black text-yellow-500 mb-2" id="winner-title">獲得勝利！</h2>
        <p class="text-2xl text-white mb-10" id="winner-name">玩家名稱</p>
        <button onclick="resetToMenu()" class="bg-white text-black px-12 py-4 rounded-full font-bold text-xl hover:bg-yellow-500 transition-colors">
            返回主選單
        </button>
    </div>

    <!-- Target Selector Overlay -->
    <div id="target-modal" class="hidden fixed inset-0 bg-black/90 z-[110] flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-red-900 p-6 rounded-2xl text-center max-w-sm w-full shadow-2xl">
            <h3 class="text-2xl font-black text-red-500 mb-6 tracking-widest">鎖定目標</h3>
            <div id="target-list" class="grid grid-cols-2 gap-3 max-h-[60vh] overflow-y-auto"></div>
            <button onclick="closeTargetModal()" class="mt-6 text-gray-400 hover:text-white transition-colors text-sm">取消</button>
        </div>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
</body>
</html>
